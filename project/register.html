<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftWorld — Register</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <nav class="nav">
    <a href="index.html" class="nav-logo">⛏ CraftWorld</a>
  </nav>

  <main class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-icon">🌍</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Start your adventure</p>

      <div class="msg msg--error" id="error-msg" style="display:none;"></div>
      <div class="msg msg--success" id="success-msg" style="display:none;"></div>

      <form id="register-form">
        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Choose a username"
            maxlength="20"
            autocomplete="username"
          />
          <span class="field-hint">Letters, numbers and underscores only, max 20 chars</span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="your@email.com"
            autocomplete="email"
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Create a password (min 4 chars)"
            autocomplete="new-password"
          />
        </div>

        <div class="field">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            placeholder="Repeat your password"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="btn-primary btn-full" id="register-btn">
          ⛏ Create Account
        </button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="login.html">Sign in here</a>
      </p>

    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
