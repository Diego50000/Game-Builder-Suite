<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftWorld — Profile</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    .profile-container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      color: white;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .avatar {
      font-size: 50px;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    .stat-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 5px;
      text-align: center;
    }
    .stat-label {
      font-size: 12px;
      opacity: 0.8;
    }
    .stat-value {
      font-size: 18px;
      font-family: 'Press Start 2P', cursive;
    }
    .worlds-list, .mobs-list {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.1);
      padding: 10px;
      border-radius: 5px;
    }
    .world-item, .mob-item {
      padding: 8px;
      margin: 5px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      display: flex;
      justify-content: space-between;
    }
    .edit-btn {
      background: #4CAF50;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
    }
    .edit-btn:hover {
      background: #45a049;
    }
    textarea, input[type="text"] {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      color: white;
      font-family: 'VT323', monospace;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">⛏ CraftWorld</a>
    <div style="display:flex;gap:20px;align-items:center;">
      <a href="game.html" class="nav-link">Play</a>
      <a href="leaderboard.html" class="nav-link">🏆 Leaderboard</a>
    </div>
  </nav>

  <!-- Profile Container -->
  <div class="profile-container">
    <!-- Header with Avatar and Username -->
    <div class="profile-header">
      <div class="avatar" id="profile-avatar">🧑</div>
      <div>
        <h1 id="profile-username">Loading...</h1>
        <p id="profile-email">Loading...</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="profile-stats">
      <div class="stat-box">
        <div class="stat-label">Playtime</div>
        <div class="stat-value" id="stat-playtime">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Blocks Mined</div>
        <div class="stat-value" id="stat-blocks-mined">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Zombies Killed</div>
        <div class="stat-value" id="stat-zombies-killed">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Worlds Created</div>
        <div class="stat-value" id="stat-worlds">0</div>
      </div>
    </div>

    <!-- Bio Section -->
    <div>
      <h3>Bio</h3>
      <p id="profile-bio">This user hasn't written a bio yet.</p>
      <button class="edit-btn" id="edit-bio-btn">Edit Bio</button>
      <textarea id="bio-textarea" style="display: none;"></textarea>
      <button class="edit-btn" id="save-bio-btn" style="display: none;">Save Bio</button>
    </div>

    <!-- Worlds List -->
    <div class="worlds-list">
      <h3>My Worlds</h3>
      <div id="worlds-container">
        <p>No worlds yet. <a href="game.html">Create one!</a></p>
      </div>
    </div>

    <!-- Mobs List -->
    <div class="mobs-list">
      <h3>My Custom Mobs</h3>
      <div id="mobs-container">
        <p>No custom mobs yet.</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
